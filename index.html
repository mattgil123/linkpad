<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0c10" />
  <title>// LINKPAD</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0c10;
      --bg-2:      #0f1117;
      --surface:   #141720;
      --surface-2: #1c2030;
      --border:    #252a38;
      --border-2:  #2e3448;
      --green:     #00ff9d;
      --green-dim: #00c97a;
      --green-bg:  rgba(0,255,157,0.06);
      --amber:     #f0a500;
      --text:      #c8cdd8;
      --text-2:    #6b7280;
      --text-3:    #3d4355;
      --danger:    #ff4b6e;
      --mono:      'JetBrains Mono', 'Fira Code', monospace;
      --radius:    4px;
    }

    html { font-size: 16px; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      min-height: 100vh;
      padding: 0 1rem;
      background-image: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px
      );
    }

    /* ── HEADER ── */
    header {
      max-width: 700px;
      margin: 0 auto;
      padding: 2.5rem 0 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.4rem;
    }

    .wordmark {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--green);
      text-shadow: 0 0 12px rgba(0,255,157,0.5);
    }

    .wordmark .slash { color: var(--text-2); }

    .header-actions { display: flex; gap: 0.4rem; }

    .header-sub {
      font-size: 0.62rem;
      color: var(--text-3);
      letter-spacing: 0.06em;
    }

    .cursor-blink {
      display: inline-block;
      width: 7px; height: 12px;
      background: var(--green);
      margin-left: 3px;
      vertical-align: middle;
      animation: blink 1.1s step-end infinite;
      box-shadow: 0 0 6px var(--green);
    }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* ── BUTTONS ── */
    .btn {
      font-family: var(--mono);
      font-size: 0.62rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.4rem 0.8rem;
      border-radius: var(--radius);
      border: 1px solid var(--border-2);
      background: var(--surface);
      color: var(--text-2);
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn:hover {
      border-color: var(--green);
      color: var(--green);
      background: var(--green-bg);
      box-shadow: 0 0 8px rgba(0,255,157,0.15);
    }

    .btn-green {
      background: var(--green-bg);
      color: var(--green);
      border-color: var(--green-dim);
    }

    .btn-green:hover {
      background: rgba(0,255,157,0.12);
      box-shadow: 0 0 14px rgba(0,255,157,0.25);
    }

    /* ── MAIN ── */
    main {
      max-width: 700px;
      margin: 0 auto;
      padding: 1.75rem 0 4rem;
    }

    .prompt-line {
      font-size: 0.65rem;
      color: var(--text-3);
      margin-bottom: 0.7rem;
      letter-spacing: 0.04em;
    }

    .prompt-line .p-symbol { color: var(--green); margin-right: 0.4rem; }
    .prompt-line .p-cmd    { color: var(--amber); }

    /* ── ADD CARD ── */
    .add-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 2px solid var(--green);
      border-radius: var(--radius);
      padding: 1rem 1.1rem 0.85rem;
      margin-bottom: 2rem;
      box-shadow: 0 0 24px rgba(0,0,0,0.4);
    }

    .add-card label {
      display: block;
      font-size: 0.58rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 0.4rem;
    }

    .input-row { display: flex; gap: 0.5rem; align-items: stretch; }

    .url-input {
      flex: 1;
      font-family: var(--mono);
      font-size: 0.8rem;
      padding: 0.55rem 0.75rem;
      border-radius: var(--radius);
      border: 1px solid var(--border-2);
      background: var(--bg-2);
      color: var(--green);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      caret-color: var(--green);
    }

    .url-input:focus { border-color: var(--green-dim); box-shadow: 0 0 10px rgba(0,255,157,0.1); }
    .url-input::placeholder { color: var(--text-3); }

    .note-input {
      margin-top: 0.6rem;
      width: 100%;
      font-family: var(--mono);
      font-size: 0.78rem;
      padding: 0.5rem 0.75rem;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--bg-2);
      color: var(--text);
      outline: none;
      resize: none;
      height: 50px;
      transition: border-color 0.15s;
      caret-color: var(--green);
    }

    .note-input:focus { border-color: var(--border-2); }
    .note-input::placeholder { color: var(--text-3); }

    /* ── TOOLBAR ── */
    .toolbar { display: flex; gap: 0.5rem; align-items: center; margin-bottom: 1rem; }

    .search-wrap { flex: 1; position: relative; }

    .search-prefix {
      position: absolute;
      left: 0.65rem; top: 50%;
      transform: translateY(-50%);
      color: var(--text-3);
      font-size: 0.65rem;
      pointer-events: none;
      letter-spacing: 0;
    }

    .search-input {
      width: 100%;
      font-family: var(--mono);
      font-size: 0.78rem;
      padding: 0.48rem 0.75rem 0.48rem 1.9rem;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
      caret-color: var(--green);
    }

    .search-input:focus { border-color: var(--border-2); }
    .search-input::placeholder { color: var(--text-3); }

    .count-label { font-size: 0.62rem; color: var(--text-3); letter-spacing: 0.08em; white-space: nowrap; }

    /* ── LINK LIST ── */
    .link-list { display: flex; flex-direction: column; gap: 0.5rem; }

    .empty-state {
      text-align: center;
      padding: 4rem 1rem;
      color: var(--text-3);
      font-size: 0.72rem;
      line-height: 2;
      letter-spacing: 0.04em;
    }

    .empty-state .big {
      display: block;
      font-size: 0.62rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--green);
      margin-bottom: 0.4rem;
      text-shadow: 0 0 10px rgba(0,255,157,0.4);
    }

    /* ── LINK CARD ── */
    .link-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.75rem 0.9rem;
      display: flex;
      align-items: flex-start;
      gap: 0.7rem;
      transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
      animation: slideIn 0.18s ease;
      position: relative;
    }

    .link-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 2px;
      background: var(--border);
      border-radius: 2px 0 0 2px;
      transition: background 0.15s, box-shadow 0.15s;
    }

    .link-card:hover { border-color: var(--border-2); background: var(--surface-2); box-shadow: 0 0 20px rgba(0,0,0,0.3); }
    .link-card:hover::before { background: var(--green); box-shadow: 0 0 8px rgba(0,255,157,0.4); }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-5px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .favicon { width: 16px; height: 16px; border-radius: 3px; flex-shrink: 0; margin-top: 3px; opacity: 0.8; }

    .link-body { flex: 1; min-width: 0; }

    .link-title {
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--text);
      text-decoration: none;
      display: block;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.4;
      transition: color 0.12s;
    }

    .link-title:hover { color: var(--green); text-shadow: 0 0 8px rgba(0,255,157,0.3); }

    .link-url {
      display: block;
      font-size: 0.65rem;
      color: var(--text-3);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 0.15rem;
    }

    .link-note { font-size: 0.72rem; color: var(--text-2); margin-top: 0.3rem; line-height: 1.5; }

    .link-meta { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.3rem; }

    .link-date { font-size: 0.6rem; color: var(--text-3); letter-spacing: 0.05em; }

    .link-actions { display: flex; gap: 0.25rem; flex-shrink: 0; margin-top: 1px; }

    .icon-btn {
      background: none; border: none; cursor: pointer;
      color: var(--text-3); padding: 0.25rem; border-radius: 3px;
      transition: color 0.12s, background 0.12s;
      display: flex; align-items: center;
    }

    .icon-btn:hover { color: var(--green); background: var(--green-bg); }
    .icon-btn.del:hover { color: var(--danger); background: rgba(255,75,110,0.08); }

    /* ── MODAL ── */
    .modal-backdrop {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(3px);
      z-index: 100; align-items: center; justify-content: center; padding: 1rem;
    }

    .modal-backdrop.open { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border-2);
      border-top: 2px solid var(--green);
      border-radius: var(--radius);
      padding: 1.5rem; width: 100%; max-width: 420px;
      box-shadow: 0 0 40px rgba(0,0,0,0.6), 0 0 20px rgba(0,255,157,0.05);
      animation: popIn 0.15s ease;
    }

    @keyframes popIn { from { transform: scale(0.97); opacity: 0; } to { transform: scale(1); opacity: 1; } }

    .modal-title {
      font-size: 0.62rem; font-weight: 700;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--green); margin-bottom: 0.75rem;
    }

    .modal p { font-size: 0.75rem; color: var(--text-2); margin-bottom: 0.9rem; line-height: 1.6; }

    .modal textarea {
      width: 100%; font-family: var(--mono); font-size: 0.68rem;
      padding: 0.6rem; border: 1px solid var(--border-2); border-radius: var(--radius);
      background: var(--bg-2); color: var(--green); resize: vertical; height: 110px;
      outline: none; caret-color: var(--green);
    }

    .modal-actions { display: flex; gap: 0.4rem; justify-content: flex-end; margin-top: 1rem; }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 1.5rem; left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: var(--surface-2); border: 1px solid var(--green-dim);
      color: var(--green); font-family: var(--mono); font-size: 0.68rem;
      letter-spacing: 0.08em; padding: 0.5rem 1rem; border-radius: var(--radius);
      opacity: 0; transition: opacity 0.18s, transform 0.18s;
      pointer-events: none; white-space: nowrap; z-index: 200;
      box-shadow: 0 0 16px rgba(0,255,157,0.2);
    }

    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 480px) {
      header { padding: 1.75rem 0 1.25rem; }
      .input-row { flex-direction: column; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <span class="wordmark"><span class="slash">// </span>LINKPAD<span class="cursor-blink"></span></span>
    <div class="header-actions">
      <button class="btn" id="importBtn">Import</button>
      <button class="btn" id="exportBtn">Export</button>
    </div>
  </div>
  <div class="header-sub">personal url notepad &nbsp;·&nbsp; stored locally &nbsp;·&nbsp; export to sync</div>
</header>

<main>
  <div class="prompt-line">
    <span class="p-symbol">$</span><span class="p-cmd">linkpad</span> --add-url
  </div>

  <!-- Add URL -->
  <div class="add-card">
    <label for="urlInput">Paste a URL</label>
    <div class="input-row">
      <input type="url" id="urlInput" class="url-input" placeholder="https://..." autocomplete="off" spellcheck="false" />
      <button class="btn btn-green" id="addBtn">Save</button>
    </div>
    <textarea id="noteInput" class="note-input" placeholder="Optional note…" rows="2"></textarea>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-prefix">//</span>
      <input type="search" id="searchInput" class="search-input" placeholder="search links..." />
    </div>
    <span class="count-label" id="countLabel"></span>
  </div>

  <!-- List -->
  <div class="link-list" id="linkList"></div>
  <div class="empty-state" id="emptyState" style="display:none">
    <span class="big">// no links saved</span>
    paste a url above and hit save_
  </div>
</main>

<!-- Import modal -->
<div class="modal-backdrop" id="importModal">
  <div class="modal">
    <div class="modal-title">// Import Links</div>
    <p>Paste JSON exported from another device to merge your links.</p>
    <textarea id="importData" placeholder='[{"url":"...","note":"...","title":"...","saved":"..."}]'></textarea>
    <div class="modal-actions">
      <button class="btn" id="cancelImport">Cancel</button>
      <button class="btn btn-green" id="confirmImport">Import</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  /* ── Storage ── */
  const STORE_KEY = 'linkpad_v1';
  let links = [];

  function load() {
    try { links = JSON.parse(localStorage.getItem(STORE_KEY)) || []; }
    catch { links = []; }
  }

  function save() {
    localStorage.setItem(STORE_KEY, JSON.stringify(links));
  }

  /* ── Toast ── */
  let toastTimer;
  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
  }

  /* ── Helpers ── */
  function domain(url) {
    try { return new URL(url).hostname.replace(/^www\./, ''); }
    catch { return url; }
  }

  function faviconSrc(url) {
    try { return `https://www.google.com/s2/favicons?sz=32&domain=${new URL(url).hostname}`; }
    catch { return ''; }
  }

  function displayTitle(link) {
    return link.title || domain(link.url) || link.url;
  }

  function formatDate(iso) {
    const d = new Date(iso);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  /* ── Render ── */
  function render() {
    const q = document.getElementById('searchInput').value.trim().toLowerCase();
    const list = document.getElementById('linkList');
    const empty = document.getElementById('emptyState');
    const counter = document.getElementById('countLabel');

    const filtered = q
      ? links.filter(l =>
          (l.url || '').toLowerCase().includes(q) ||
          (l.note || '').toLowerCase().includes(q) ||
          (l.title || '').toLowerCase().includes(q))
      : links;

    counter.textContent = filtered.length
      ? `${filtered.length} link${filtered.length !== 1 ? 's' : ''}`
      : '';

    list.innerHTML = '';

    if (filtered.length === 0) {
      empty.style.display = 'block';
    } else {
      empty.style.display = 'none';
      filtered.forEach((link, idx) => {
        const realIdx = links.indexOf(link);
        const card = document.createElement('div');
        card.className = 'link-card';
        card.innerHTML = `
          <img class="favicon" src="${faviconSrc(link.url)}" alt="" onerror="this.style.display='none'" />
          <div class="link-body">
            <a class="link-title" href="${escHtml(link.url)}" target="_blank" rel="noopener">${escHtml(displayTitle(link))}</a>
            <span class="link-url">${escHtml(domain(link.url))}</span>
            ${link.note ? `<p class="link-note">&gt; ${escHtml(link.note)}</p>` : ''}
            <div class="link-meta">
              <span class="link-date">${formatDate(link.saved)}</span>
            </div>
          </div>
          <div class="link-actions">
            <button class="icon-btn" title="Copy URL" data-action="copy" data-idx="${realIdx}">${iconCopy()}</button>
            <button class="icon-btn del" title="Delete" data-action="delete" data-idx="${realIdx}">${iconTrash()}</button>
          </div>`;
        list.appendChild(card);
      });
    }
  }

  function escHtml(s) {
    return String(s ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  /* ── SVG icons ── */
  function iconCopy() {
    return `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;
  }

  function iconTrash() {
    return `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>`;
  }

  /* ── Add link ── */
  async function addLink() {
    const urlEl = document.getElementById('urlInput');
    const noteEl = document.getElementById('noteInput');
    let url = urlEl.value.trim();
    const note = noteEl.value.trim();

    if (!url) return;
    if (!/^https?:\/\//i.test(url)) url = 'https://' + url;

    if (existing) { toast('> already saved'); return; }

    const link = { url, note, title: domain(url), saved: new Date().toISOString() };
    links.unshift(link);
    save();
    render();

    urlEl.value = '';
    noteEl.value = '';
    urlEl.focus();
    toast('> saved_');

    // Async title fetch via unfurl
    try {
      const res = await fetch(`https://api.microlink.io/?url=${encodeURIComponent(url)}`);
      const data = await res.json();
      if (data?.data?.title) {
        link.title = data.data.title;
        save();
        render();
      }
    } catch {}
  }

  /* ── Events ── */
  document.getElementById('addBtn').addEventListener('click', addLink);

  document.getElementById('urlInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') addLink();
  });

  document.getElementById('searchInput').addEventListener('input', render);

  document.getElementById('linkList').addEventListener('click', e => {
    const btn = e.target.closest('[data-action]');
    if (!btn) return;
    const idx = parseInt(btn.dataset.idx, 10);
    const action = btn.dataset.action;

    if (action === 'delete') {
      links.splice(idx, 1);
      save();
      render();
      toast('> removed');
    }
    if (action === 'copy') {
      navigator.clipboard.writeText(links[idx].url).then(() => toast('> copied_'));
    }
  });

  /* ── Export ── */
  document.getElementById('exportBtn').addEventListener('click', () => {
    const json = JSON.stringify(links, null, 2);
    const blob = new Blob([json], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `linkpad-export-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    toast('> exported_');
  });

  /* ── Import ── */
  document.getElementById('importBtn').addEventListener('click', () => {
    document.getElementById('importModal').classList.add('open');
    document.getElementById('importData').value = '';
    document.getElementById('importData').focus();
  });

  document.getElementById('cancelImport').addEventListener('click', () => {
    document.getElementById('importModal').classList.remove('open');
  });

  document.getElementById('importModal').addEventListener('click', e => {
    if (e.target === document.getElementById('importModal'))
      document.getElementById('importModal').classList.remove('open');
  });

  document.getElementById('confirmImport').addEventListener('click', () => {
    try {
      const incoming = JSON.parse(document.getElementById('importData').value.trim());
      if (!Array.isArray(incoming)) throw new Error();
      let added = 0;
      incoming.forEach(l => {
        if (l.url && !links.find(x => x.url === l.url)) {
          links.push(l);
          added++;
        }
      });
      links.sort((a, b) => new Date(b.saved) - new Date(a.saved));
      save();
      render();
      document.getElementById('importModal').classList.remove('open');
      toast(`> imported ${added} link${added !== 1 ? 's' : ''}`);
    } catch {
      toast('> error: invalid json');
    }
  });

  /* ── Init ── */
  load();
  render();
</script>
</body>
</html>
